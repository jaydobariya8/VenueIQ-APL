<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueIQ — Crowd Intelligence</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:        #0b0f18;
      --sidebar:   #0f1521;
      --card:      #141d2e;
      --card2:     #1a2540;
      --border:    #1e2d47;
      --border2:   #243352;
      --text:      #e2e8f0;
      --muted:     #4b607a;
      --muted2:    #7a93b0;
      --accent:    #f97316;
      --accent-d:  rgba(249,115,22,0.14);
      --accent-b:  rgba(249,115,22,0.28);
      --green:     #22c55e;
      --green-d:   rgba(34,197,94,0.13);
      --yellow:    #eab308;
      --yellow-d:  rgba(234,179,8,0.13);
      --red:       #ef4444;
      --red-d:     rgba(239,68,68,0.13);
      --blue:      #3b82f6;
      --blue-d:    rgba(59,130,246,0.13);
      --purple:    #a855f7;
      --purple-d:  rgba(168,85,247,0.13);
      --pink:      #ec4899;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    button, input, select { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; color: inherit; }
    input, select { outline: none; }

    /* Layout grid */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 58px 1fr;
      height: 100vh;
      overflow: hidden;
    }
    .topbar { grid-column: 1; grid-row: 1; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
    .main   { grid-column: 1; grid-row: 2; overflow-y: auto; padding: 20px; }

    /* FAB (floating action buttons) */
    .fab {
      position: fixed; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s;
      z-index: 501;
    }
    .fab:hover { transform: scale(1.06); }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .card:hover { border-color: var(--border2); }

    /* Nav item */
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 12px; border-radius: 8px;
      font-size: 12.5px; font-weight: 500;
      color: var(--muted2); cursor: pointer;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .nav-item:hover  { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: var(--accent-d); color: var(--accent); }

    /* Section label */
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: .9px;
      color: var(--muted); padding: 4px 12px; margin-top: 16px; margin-bottom: 2px;
    }

    /* Animations */
    @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer   { 0%{background-position:-800px 0} 100%{background-position:800px 0} }
    .live-dot  { animation: pulse 1.6s ease-in-out infinite; }
    .fade-in   { animation: fadeSlide .3s ease forwards; }
    .shimmer-box {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 1600px 100%; animation: shimmer 1.8s linear infinite;
      border-radius: 12px;
    }

    /* Zone card grid */
    .zone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

    /* Stat chips */
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 600; letter-spacing: .2px;
    }

    /* Input style */
    .input-base {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12.5px;
      transition: border-color .15s;
    }
    .input-base:focus { border-color: var(--accent); }
    .input-base::placeholder { color: var(--muted); }

    /* Icon box */
    .icon-box {
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── helpers ──────────────────────────────────────────────────────────── */
const zoneIcon = k => k.includes('restroom') ? '🚻' : k.includes('concession') ? '🍕' : '🏆';
const zoneCat  = k => k.includes('restroom') ? 'RESTROOM' : k.includes('concession') ? 'FOOD' : 'LOUNGE';

const occMeta = pct => pct < 50
  ? { color: 'var(--green)',  dim: 'var(--green-d)',  label: 'CLEAR'    }
  : pct < 75
  ? { color: 'var(--yellow)', dim: 'var(--yellow-d)', label: 'MODERATE' }
  : { color: 'var(--red)',    dim: 'var(--red-d)',     label: 'CROWDED'  };

const sentMeta = s => s >= 0.70
  ? { color: 'var(--green)',  emoji: '😊', label: 'Happy'     }
  : s >= 0.55
  ? { color: 'var(--yellow)', emoji: '😐', label: 'Neutral'   }
  : { color: 'var(--red)',    emoji: '😤', label: 'Frustrated' };

const fmtTime = iso => {
  try {
    const d = new Date(iso), diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    return d.toLocaleTimeString();
  } catch { return '--'; }
};

const api = (path, opts) => fetch(path, opts).then(r => r.json());

/* ── AlertToast ───────────────────────────────────────────────────────── */
function AlertToast({ alert, onDismiss }) {
  const hi = alert.severity === 'HIGH';
  const borderColor = hi ? 'var(--red)' : 'var(--yellow)';
  return (
    <div className="fade-in" style={{
      background: 'var(--card)', border: `1px solid ${borderColor}`,
      borderLeft: `4px solid ${borderColor}`, borderRadius: 10,
      padding: '12px 14px', maxWidth: 320,
      boxShadow: `0 8px 32px ${hi ? 'rgba(239,68,68,0.2)' : 'rgba(234,179,8,0.15)'}`,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8 }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
            <span style={{ fontSize: 10, fontWeight: 800, color: borderColor, letterSpacing: .6 }}>
              {hi ? '🚨' : '⚠️'} {alert.severity} ALERT
            </span>
            <span style={{ fontSize: 9.5, color: 'var(--muted)', background: 'rgba(255,255,255,0.05)', padding: '1px 6px', borderRadius: 4 }}>
              {alert.zone_id}
            </span>
          </div>
          <div style={{ fontSize: 12, color: 'var(--text)', lineHeight: 1.5 }}>{alert.staff_alert}</div>
        </div>
        <button onClick={onDismiss} style={{ color: 'var(--muted)', fontSize: 18, lineHeight: 1, flexShrink: 0, marginTop: -2, cursor: 'pointer' }}>×</button>
      </div>
    </div>
  );
}

/* ── ToastContainer ───────────────────────────────────────────────────── */
function ToastContainer({ toasts, onDismiss }) {
  if (!toasts.length) return null;
  return (
    <div style={{ position: 'fixed', top: 72, right: 16, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, maxWidth: 320 }}>
      {toasts.map(t => <AlertToast key={t.toastId} alert={t} onDismiss={() => onDismiss(t.toastId)} />)}
    </div>
  );
}

/* ── AlertCard ────────────────────────────────────────────────────────── */
function AlertCard({ alert, onAcknowledge }) {
  const [showPA, setShowPA] = useState(false);
  const hi    = alert.severity === 'HIGH';
  const color = hi ? 'var(--red)' : 'var(--yellow)';
  const dim   = hi ? 'var(--red-d)' : 'var(--yellow-d)';
  return (
    <div className="card" style={{ marginBottom: 10, padding: '13px 14px', borderLeft: `3px solid ${color}`, opacity: alert.acknowledged ? 0.5 : 1, transition: 'opacity .3s' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 7 }}>
        <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
          <span className="chip" style={{ background: dim, color, fontSize: 9 }}>{hi ? '🚨' : '⚠️'} {alert.severity}</span>
          <span style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--muted2)', background: 'rgba(255,255,255,0.05)', padding: '1px 6px', borderRadius: 4 }}>{alert.zone_id}</span>
        </div>
        <span style={{ fontSize: 9.5, color: 'var(--muted)' }}>{fmtTime(alert.timestamp)}</span>
      </div>
      <div style={{ fontSize: 12.5, fontWeight: 700, marginBottom: 2 }}>{alert.zone_name}</div>
      <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 9 }}>{alert.trigger} · {alert.occupancy_percent}% full · {alert.wait_time_min} min wait</div>
      <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 7, padding: '9px 10px', marginBottom: 7 }}>
        <div style={{ fontSize: 9, color, fontWeight: 800, letterSpacing: .6, marginBottom: 3 }}>OPS TEAM</div>
        <div style={{ fontSize: 12, lineHeight: 1.55 }}>{alert.staff_alert}</div>
      </div>
      {showPA && (
        <div className="fade-in" style={{ background: 'var(--blue-d)', border: '1px solid rgba(59,130,246,0.28)', borderRadius: 7, padding: '9px 10px', marginBottom: 7 }}>
          <div style={{ fontSize: 9, color: 'var(--blue)', fontWeight: 800, letterSpacing: .6, marginBottom: 3 }}>📢 PA BROADCAST</div>
          <div style={{ fontSize: 12, lineHeight: 1.55 }}>{alert.pa_message}</div>
        </div>
      )}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        <button onClick={() => setShowPA(!showPA)} style={{
          padding: '4px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer',
          background: showPA ? 'var(--blue-d)' : 'rgba(255,255,255,0.04)',
          color: showPA ? 'var(--blue)' : 'var(--muted2)',
          border: `1px solid ${showPA ? 'rgba(59,130,246,0.3)' : 'var(--border)'}`,
        }}>📢 PA Message</button>
        {!alert.acknowledged
          ? <button onClick={() => onAcknowledge(alert.id)} style={{ padding: '4px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer', background: 'rgba(255,255,255,0.04)', color: 'var(--muted2)', border: '1px solid var(--border)' }}>✓ Acknowledge</button>
          : <span style={{ fontSize: 10, color: 'var(--green)', padding: '4px 0', display: 'flex', alignItems: 'center' }}>✓ Acknowledged</span>
        }
      </div>
    </div>
  );
}

/* ── AlertPanel ───────────────────────────────────────────────────────── */
function AlertPanel({ alerts, onClose, onAcknowledge, onRefresh }) {
  const high = alerts.filter(a => a.severity === 'HIGH').length;
  const med  = alerts.filter(a => a.severity === 'MEDIUM').length;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 1000, background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
      <div className="fade-in" style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: 390, background: 'var(--sidebar)', borderLeft: '1px solid var(--border)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}
        onClick={e => e.stopPropagation()}>
        {/* header */}
        <div style={{ padding: '18px 18px 14px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 15 }}>🔔 AI Alert Feed</div>
              <div style={{ fontSize: 10.5, color: 'var(--muted)', marginTop: 2 }}>Gemini-powered operational intelligence</div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={onRefresh} style={{ padding: '5px 10px', borderRadius: 7, fontSize: 11, fontWeight: 600, background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)', color: 'var(--muted2)', cursor: 'pointer' }}>↻ Check Now</button>
              <button onClick={onClose} style={{ color: 'var(--muted2)', fontSize: 22, lineHeight: 1, cursor: 'pointer' }}>×</button>
            </div>
          </div>
          {alerts.length > 0 && (
            <div style={{ display: 'flex', gap: 7 }}>
              {high > 0 && <span className="chip" style={{ background: 'var(--red-d)', color: 'var(--red)', fontSize: 10 }}>🚨 {high} HIGH</span>}
              {med  > 0 && <span className="chip" style={{ background: 'var(--yellow-d)', color: 'var(--yellow)', fontSize: 10 }}>⚠️ {med} MEDIUM</span>}
            </div>
          )}
        </div>
        {/* content */}
        <div style={{ flex: 1, overflowY: 'auto', padding: 14 }}>
          {alerts.length === 0
            ? <div style={{ textAlign: 'center', paddingTop: 60 }}>
                <div style={{ fontSize: 36, marginBottom: 10 }}>✅</div>
                <div style={{ fontSize: 13, color: 'var(--muted)' }}>All zones within normal parameters</div>
                <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>Simulate a surge to trigger AI alerts</div>
              </div>
            : alerts.map(a => <AlertCard key={a.id} alert={a} onAcknowledge={onAcknowledge} />)
          }
        </div>
      </div>
    </div>
  );
}

/* ── CircleGauge ──────────────────────────────────────────────────────── */
function CircleGauge({ pct, color, size = 76, sw = 7 }) {
  const r = (size - sw * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - Math.min(pct, 100) / 100);
  const c = size / 2;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', display: 'block' }}>
        <circle cx={c} cy={c} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw} />
        <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={offset}
          style={{ transition: 'stroke-dashoffset .7s cubic-bezier(.4,0,.2,1), stroke .5s ease' }}
        />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: size * 0.195, fontWeight: 800, color, lineHeight: 1 }}>{pct}%</span>
      </div>
    </div>
  );
}

/* ── MiniBar ──────────────────────────────────────────────────────────── */
function MiniBar({ val, color }) {
  return (
    <div style={{ flex: 1, height: 4, borderRadius: 99, background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>
      <div style={{ width: `${val}%`, height: '100%', borderRadius: 99, background: color, transition: 'width .6s ease' }} />
    </div>
  );
}

/* ── ZoneCard ─────────────────────────────────────────────────────────── */
function ZoneCard({ zoneKey, zone }) {
  const pct  = zone.occupancy_percent;
  const om   = occMeta(pct);
  const sm   = sentMeta(zone.emotion.avg_sentiment_score);

  return (
    <div className="card fade-in" style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 14, transition: 'border-color .2s' }}
      onMouseEnter={e => e.currentTarget.style.borderColor = om.color}
      onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
    >
      {/* ── row 1: identity + gauge ── */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
        <div style={{ flex: 1 }}>
          {/* zone icon + name */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 10 }}>
            <div className="icon-box" style={{ width: 36, height: 36, background: om.dim, fontSize: 17 }}>
              {zoneIcon(zoneKey)}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, flexWrap: 'wrap' }}>
                <div style={{ fontWeight: 700, fontSize: 12.5, lineHeight: 1.2 }}>{zone.name}</div>
                {zone.zone_id && (
                  <span style={{ fontSize: 9, fontWeight: 700, background: 'rgba(255,255,255,0.06)', color: 'var(--muted2)', padding: '1px 6px', borderRadius: 4, letterSpacing: .5 }}>
                    {zone.zone_id}
                  </span>
                )}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginTop: 3 }}>
                <span className="chip" style={{ background: om.dim, color: om.color, fontSize: 9 }}>{om.label}</span>
                {zone.section && <span style={{ fontSize: 9.5, color: 'var(--muted)' }}>{zone.section}</span>}
              </div>
            </div>
          </div>

          {/* capacity bar */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
              <span style={{ fontSize: 11, color: 'var(--muted2)' }}>Occupancy</span>
              <span style={{ fontSize: 11, color: 'var(--muted2)' }}>{zone.count} / {zone.capacity}</span>
            </div>
            <div style={{ height: 6, background: 'rgba(255,255,255,0.06)', borderRadius: 99, overflow: 'hidden' }}>
              <div style={{ width: `${pct}%`, height: '100%', background: om.color, borderRadius: 99, transition: 'width .7s ease' }} />
            </div>
          </div>

          {/* wait time */}
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5 }}>
            <span style={{ fontSize: 26, fontWeight: 800, lineHeight: 1, color: om.color }}>{zone.wait_time_min}</span>
            <span style={{ fontSize: 12, color: 'var(--muted2)' }}>min wait</span>
          </div>
        </div>

        {/* gauge */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <CircleGauge pct={pct} color={om.color} size={78} sw={7} />
          <span style={{ fontSize: 10, color: 'var(--muted)' }}>occupancy</span>
        </div>
      </div>

      {/* ── divider ── */}
      <div style={{ height: 1, background: 'var(--border)' }} />

      {/* ── emotion rows ── */}
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 9 }}>
          <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, letterSpacing: .7 }}>CROWD EMOTION</span>
          <span style={{ fontSize: 12, fontWeight: 800, color: sm.color }}>
            {sm.emoji} {zone.emotion.avg_sentiment_score.toFixed(2)} &nbsp;
            <span style={{ fontSize: 10, fontWeight: 600, color: 'var(--muted2)' }}>{sm.label}</span>
          </span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {[
            { emoji: '😊', key: 'happy',      color: 'var(--green)'  },
            { emoji: '😐', key: 'neutral',    color: 'var(--blue)'   },
            { emoji: '😞', key: 'sad',        color: 'var(--muted2)' },
            { emoji: '😤', key: 'frustrated', color: 'var(--red)'    },
          ].map(({ emoji, key, color }) => (
            <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
              <span style={{ fontSize: 13, width: 20 }}>{emoji}</span>
              <MiniBar val={zone.emotion[key]} color={color} />
              <span style={{ fontSize: 11, color: 'var(--muted)', minWidth: 30, textAlign: 'right' }}>
                {zone.emotion[key]}%
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* ── footer ── */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 10, color: 'var(--muted)' }}>Updated {fmtTime(zone.last_updated)}</span>
        <div style={{ width: 7, height: 7, borderRadius: '50%', background: om.color }} className="live-dot" />
      </div>
    </div>
  );
}

/* ── StatCard ─────────────────────────────────────────────────────────── */
function StatCard({ icon, label, value, sub, color, dim }) {
  return (
    <div className="card" style={{ padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 14 }}>
      <div className="icon-box" style={{ width: 46, height: 46, background: dim, fontSize: 21 }}>{icon}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 10.5, color: 'var(--muted)', letterSpacing: .6, fontWeight: 700, marginBottom: 3 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 800, color, lineHeight: 1 }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>{sub}</div>}
      </div>
    </div>
  );
}

/* ── MatchPanel ───────────────────────────────────────────────────────── */
function MatchPanel({ stats }) {
  if (!stats) return <div className="shimmer-box" style={{ height: 260, margin: 14 }} />;
  const mc     = stats.match_context;
  const minLeft = (mc.innings_break_minute || 90) - mc.current_minute;
  const sm     = sentMeta(mc.overall_crowd_sentiment);

  return (
    <div style={{ padding: '14px 14px 0', overflowY: 'auto' }}>
      <div className="sec-label" style={{ marginTop: 0, padding: 0, marginBottom: 10 }}>MATCH CONTEXT</div>

      {/* Teams + score */}
      <div className="card" style={{
        padding: '12px 14px', marginBottom: 8,
        background: 'linear-gradient(135deg,rgba(249,115,22,0.08),rgba(249,115,22,0.02))',
        borderColor: 'var(--accent-b)',
      }}>
        {/* team row */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: '#ff4444', lineHeight: 1 }}>{mc.team_a}</div>
            <div style={{ fontSize: 9, color: 'var(--muted)', letterSpacing: .8, marginTop: 2 }}>

/* ── ChatPanel ────────────────────────────────────────────────────────── */
function ChatPanel({ onClose }) {
  const [q, setQ]             = useState('');
  const [msgs, setMsgs]       = useState([]);
  const [busy, setBusy]       = useState(false);
  const [healthy, setHealthy] = useState(true);
  const endRef                = useRef(null);

  useEffect(() => {
    api('/health').then(d => setHealthy(d.google_api_key !== false)).catch(() => setHealthy(false));
  }, []);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const QUICK = [
    'Where should I go to the bathroom?',
    'Which food area is best right now?',
    'Which zone has most frustrated fans?',
    'Give me a full venue status report',
  ];

  const TOOL_COLORS = {
    get_all_zones:          ['var(--blue)',   'var(--blue-d)'   ],
    get_zone_status:        ['var(--purple)', 'var(--purple-d)' ],
    get_match_context:      ['var(--accent)', 'var(--accent-d)' ],
    recommend_zone:         ['var(--green)',  'var(--green-d)'  ],
    get_sentiment_insights: ['var(--pink)',   'var(--purple-d)' ],
  };

  const send = async (text) => {
    const msg = (text || q).trim();
    if (!msg || busy) return;
    setQ('');
    setBusy(true);
    setMsgs(m => [...m, { role: 'user', text: msg }]);
    try {
      const res = await api('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: msg }),
      });
      setMsgs(m => [...m, { role: 'agent', text: res.answer || '(no response)', tools: res.tools_used || [] }]);
    } catch (e) {
      const hint = e.message === 'Failed to fetch'
        ? '⚠️ Cannot reach server. Make sure app.py is running on port 8000.'
        : '⚠️ ' + e.message;
      setMsgs(m => [...m, { role: 'agent', text: hint, tools: [] }]);
    }
    setBusy(false);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, borderTop: '1px solid var(--border)', minHeight: 0, overflow: 'hidden' }}>
      {/* header */}
      <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 9, flexShrink: 0, background: 'linear-gradient(135deg,rgba(249,115,22,0.06),transparent)' }}>
        <div className="icon-box" style={{ width: 34, height: 34, background: 'var(--accent-d)', border: '1px solid var(--accent-b)', fontSize: 16 }}>🤖</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 13.5 }}>VenueIQ Agent</div>
          <div style={{ fontSize: 10, color: healthy ? 'var(--green)' : 'var(--red)', display: 'flex', alignItems: 'center', gap: 4, marginTop: 1 }}>
            <span className="live-dot" style={{ width: 5, height: 5, borderRadius: '50%', background: healthy ? 'var(--green)' : 'var(--red)', display: 'inline-block' }} />
            {healthy ? 'Gemini · Live Tool Use' : 'API key missing — check .env'}
          </div>
        </div>
        {onClose && (
          <button onClick={onClose} style={{ color: 'var(--muted)', fontSize: 18, lineHeight: 1, cursor: 'pointer', flexShrink: 0 }}>✕</button>
        )}
      </div>

      {/* messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '12px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {msgs.length === 0 && (
          <div style={{ paddingTop: 8 }}>
            <div style={{ textAlign: 'center', marginBottom: 16 }}>
              <div style={{ fontSize: 32, marginBottom: 6 }}>🏟️</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 3 }}>Ask me anything about the venue</div>
              <div style={{ fontSize: 11, color: 'var(--muted)' }}>Real-time crowd intelligence · Zone recommendations</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7, justifyContent: 'center' }}>
              {QUICK.map(q => (
                <button key={q} onClick={() => send(q)} style={{
                  padding: '7px 13px', borderRadius: 99,
                  background: 'rgba(249,115,22,0.08)',
                  border: '1px solid rgba(249,115,22,0.25)',
                  color: 'var(--accent)', fontSize: 11.5, cursor: 'pointer',
                  transition: 'all .15s', lineHeight: 1.4,
                }}
                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(249,115,22,0.18)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'rgba(249,115,22,0.08)'; e.currentTarget.style.borderColor = 'rgba(249,115,22,0.25)'; }}
                >{q}</button>
              ))}
            </div>
          </div>
        )}

        {msgs.map((m, i) => (
          <div key={i} className="fade-in" style={{ display: 'flex', flexDirection: 'column', alignItems: m.role === 'user' ? 'flex-end' : 'flex-start', gap: 5 }}>
            <div style={{
              maxWidth: '91%', padding: '9px 12px', fontSize: 12, lineHeight: 1.65,
              borderRadius: m.role === 'user' ? '10px 10px 2px 10px' : '10px 10px 10px 2px',
              background: m.role === 'user'
                ? 'linear-gradient(135deg,var(--accent),#fb923c)'
                : 'var(--card2)',
              border: m.role === 'user' ? 'none' : '1px solid var(--border)',
              color: m.role === 'user' ? '#fff' : 'var(--text)',
            }}>{m.text}</div>

            {m.tools && m.tools.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                {m.tools.map(t => {
                  const [c, d] = TOOL_COLORS[t] || ['var(--muted2)', 'rgba(255,255,255,0.05)'];
                  return (
                    <span key={t} className="chip" style={{ background: d, color: c, border: `1px solid ${c}40`, fontSize: 10 }}>
                      ⚡ {t.replace(/_/g, ' ')}
                    </span>
                  );
                })}
              </div>
            )}
          </div>
        ))}

        {busy && (
          <div className="fade-in" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ display: 'flex', gap: 3 }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', animation: `pulse 1.2s ${i * .22}s infinite` }} />
              ))}
            </div>
            <span style={{ fontSize: 11, color: 'var(--muted)' }}>Analysing zones...</span>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* input */}
      <div style={{ padding: '10px 12px', borderTop: '1px solid var(--border)', display: 'flex', gap: 7, flexShrink: 0 }}>
        <input
          value={q}
          onChange={e => setQ(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && send()}
          placeholder="Ask the agent..."
          className="input-base"
          style={{ flex: 1, padding: '8px 11px' }}
        />
        <button
          onClick={() => send()}
          disabled={busy || !q.trim()}
          style={{
            padding: '8px 16px', borderRadius: 8, fontWeight: 700, fontSize: 12,
            background: busy || !q.trim() ? 'rgba(255,255,255,0.04)' : 'var(--accent)',
            color:      busy || !q.trim() ? 'var(--muted)' : '#fff',
            transition: 'all .15s',
          }}
        >{busy ? '•••' : 'Ask'}</button>
      </div>
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────────── */
function App() {
  const [zones,      setZones]      = useState(null);
  const [stats,      setStats]      = useState(null);
  const [lastTs,     setLastTs]     = useState(null);
  const [err,        setErr]        = useState(null);
  const [alerts,     setAlerts]     = useState([]);
  const [toasts,     setToasts]     = useState([]);
  const [showAlerts, setShowAlerts] = useState(false);
  const seenIds = useRef(new Set());

  const refresh = useCallback(async () => {
    try {
      const [z, s] = await Promise.all([api('/zones'), api('/stats')]);
      setZones(z); setStats(s);
      setLastTs(new Date()); setErr(null);
    } catch { setErr('Cannot reach server — is app.py running on :8000?'); }
  }, []);

  const addToast = useCallback((alert) => {
    const toastId = Date.now() + Math.random();
    setToasts(t => [...t.slice(-3), { ...alert, toastId }]);
    setTimeout(() => setToasts(t => t.filter(x => x.toastId !== toastId)), 3000);
  }, []);

  const fetchAlerts = useCallback(async () => {
    try {
      const data = await api('/alerts');
      const all = data.alerts || [];
      const fresh = all.filter(a => !seenIds.current.has(a.id));
      fresh.forEach(a => { seenIds.current.add(a.id); addToast(a); });
      setAlerts(all);
    } catch {}
  }, [addToast]);

  const handleSimResult = useCallback((res) => {
    const newOnes = res.new_alerts || [];
    newOnes.forEach(a => { seenIds.current.add(a.id); addToast(a); });
    if (newOnes.length) {
      setAlerts(prev => {
        const ids = new Set(prev.map(x => x.id));
        return [...newOnes.filter(a => !ids.has(a.id)), ...prev].slice(0, 20);
      });
    }
  }, [addToast]);

  const acknowledgeAlert = async (id) => {
    try {
      await api(`/alerts/acknowledge/${id}`, { method: 'POST' });
      setAlerts(prev => prev.map(a => a.id === id ? { ...a, acknowledged: true } : a));
    } catch {}
  };

  useEffect(() => { refresh(); fetchAlerts(); }, []);
  useEffect(() => { const id = setInterval(refresh, 10000); return () => clearInterval(id); }, [refresh]);
  useEffect(() => { const id = setInterval(fetchAlerts, 15000); return () => clearInterval(id); }, [fetchAlerts]);

  const occList    = zones ? Object.values(zones).map(z => z.occupancy_percent) : [];
  const critCount  = occList.filter(p => p >= 75).length;
  const modCount   = occList.filter(p => p >= 50 && p < 75).length;
  const clrCount   = occList.filter(p => p < 50).length;
  const unreadCount = alerts.filter(a => !a.acknowledged).length;

  return (
    <>
    <div className="layout">

      {/* Top bar */}
      <div className="topbar">
        {/* Logo */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginRight: 8 }}>
          <div className="icon-box" style={{ width: 34, height: 34, background: 'var(--accent-d)', border: '1px solid var(--accent-b)', fontSize: 17 }}>🏟️</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: -.3, lineHeight: 1 }}>Venue<span style={{ color: 'var(--accent)' }}>IQ</span></div>
            <div style={{ fontSize: 9, color: 'var(--muted)', letterSpacing: .7 }}>CROWD INTELLIGENCE</div>
          </div>
        </div>

        <div style={{ width: 1, height: 28, background: 'var(--border)', flexShrink: 0 }} />

        {/* CV Demo link */}
        <a href="/demo" style={{
          textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 5,
          padding: '5px 10px', borderRadius: 8, fontSize: 11.5, fontWeight: 600,
          color: 'var(--muted2)', border: '1px solid var(--border)', background: 'var(--card)',
          transition: 'all .15s',
        }}
        onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
        onMouseLeave={e => { e.currentTarget.style.color = 'var(--muted2)'; e.currentTarget.style.borderColor = 'var(--border)'; }}
        >📷 CV Demo</a>

        <div style={{ flex: 1 }} />

        {lastTs && (
          <span style={{ fontSize: 11, color: 'var(--muted)' }}>
            Last update: {lastTs.toLocaleTimeString()}
          </span>
        )}

        {/* zone status chips */}
        {zones && (
          <div style={{ display: 'flex', gap: 6 }}>
            {critCount > 0 && <span className="chip" style={{ background: 'var(--red-d)',    color: 'var(--red)'    }}>{critCount} Critical</span>}
            {modCount  > 0 && <span className="chip" style={{ background: 'var(--yellow-d)', color: 'var(--yellow)' }}>{modCount} Moderate</span>}
            {clrCount  > 0 && <span className="chip" style={{ background: 'var(--green-d)',  color: 'var(--green)'  }}>{clrCount} Clear</span>}
          </div>
        )}

        {/* LIVE badge */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 6,
          background: 'var(--red-d)', border: '1px solid rgba(239,68,68,0.3)',
          borderRadius: 99, padding: '5px 13px',
        }}>
          <span className="live-dot" style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--red)', display: 'inline-block' }} />
          <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--red)', letterSpacing: 1 }}>LIVE</span>
        </div>

        {/* Alert bell */}
        <button onClick={() => setShowAlerts(true)} style={{
          position: 'relative', padding: '6px 11px', borderRadius: 8, fontSize: 14,
          background: unreadCount > 0 ? 'var(--red-d)' : 'var(--card)',
          border: `1px solid ${unreadCount > 0 ? 'rgba(239,68,68,0.4)' : 'var(--border)'}`,
          color: unreadCount > 0 ? 'var(--red)' : 'var(--muted2)',
          transition: 'all .2s', cursor: 'pointer',
        }}>
          🔔
          {unreadCount > 0 && (
            <span style={{ position: 'absolute', top: -5, right: -5, background: 'var(--red)', color: '#fff', fontSize: 9, fontWeight: 800, borderRadius: 99, padding: '1px 5px', minWidth: 16, textAlign: 'center' }}>
              {unreadCount}
            </span>
          )}
        </button>

        <button onClick={refresh}
          style={{
            padding: '6px 12px', borderRadius: 8, fontSize: 13, fontWeight: 700,
            background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--muted2)',
            transition: 'all .15s',
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--text)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--muted2)'; }}
        >↻</button>
      </div>

      {/* Main */}
      <div className="main">
        {err && (
          <div style={{
            background: 'var(--red-d)', border: '1px solid rgba(239,68,68,0.25)',
            borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 12, color: 'var(--red)',
          }}>⚠️ {err}</div>
        )}

        {/* Stat cards */}
        {stats ? (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 22 }}>
            <StatCard icon="👥" label="AVG OCCUPANCY"
              value={`${stats.avg_occupancy_percent}%`}
              sub="across all zones"
              color={stats.avg_occupancy_percent < 60 ? 'var(--green)' : stats.avg_occupancy_percent < 80 ? 'var(--yellow)' : 'var(--red)'}
              dim={stats.avg_occupancy_percent < 60 ? 'var(--green-d)' : stats.avg_occupancy_percent < 80 ? 'var(--yellow-d)' : 'var(--red-d)'}
            />
            <StatCard icon="❤️" label="CROWD VIBE"
              value={stats.avg_sentiment_score.toFixed(2)}
              sub={sentMeta(stats.avg_sentiment_score).label + ' mood'}
              color={sentMeta(stats.avg_sentiment_score).color}
              dim="var(--purple-d)"
            />
            <StatCard icon="🚨" label="BUSY ZONES"
              value={critCount}
              sub={`${clrCount} zone${clrCount !== 1 ? 's' : ''} clear right now`}
              color={critCount >= 2 ? 'var(--red)' : critCount === 1 ? 'var(--yellow)' : 'var(--green)'}
              dim={critCount >= 2 ? 'var(--red-d)' : 'var(--yellow-d)'}
            />
            <StatCard icon="⏰" label="INNINGS BREAK"
              value={`${(stats.match_context.innings_break_minute || 90) - stats.match_context.current_minute}m`}
              sub={`${stats.match_context.next_break_type} · Over ${stats.match_context.overs}`}
              color="var(--yellow)"
              dim="var(--yellow-d)"
            />
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 22 }}>
            {[1,2,3,4].map(i => <div key={i} className="shimmer-box" style={{ height: 82 }} />)}
          </div>
        )}

        {/* Live match score banner */}
        {stats && (() => {
          const mc = stats.match_context;
          const sm = sentMeta(mc.overall_crowd_sentiment);
          const minLeft = (mc.innings_break_minute || 90) - mc.current_minute;
          return (
            <div className="card" style={{
              padding: '10px 16px', marginBottom: 16,
              background: 'linear-gradient(135deg,rgba(249,115,22,0.06),rgba(249,115,22,0.01))',
              borderColor: 'var(--accent-b)',
              display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap',
            }}>
              {/* Teams + score */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 15, fontWeight: 900, color: '#ff4444' }}>{mc.team_a}</span>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 16, fontWeight: 900, color: 'var(--accent)', lineHeight: 1 }}>{mc.score}</div>
                  <div style={{ fontSize: 9.5, color: 'var(--muted)', lineHeight: 1, marginTop: 1 }}>Ov {mc.overs}</div>
                </div>
                <span style={{ fontSize: 15, fontWeight: 900, color: 'var(--blue)' }}>{mc.team_b}</span>
                {mc.target && <span style={{ fontSize: 10, color: 'var(--yellow)', background: 'var(--yellow-d)', padding: '2px 7px', borderRadius: 99 }}>Target {mc.target}</span>}
              </div>

              <div style={{ width: 1, height: 28, background: 'var(--border)', flexShrink: 0 }} />

              {/* Stats */}
              <div style={{ display: 'flex', gap: 14, fontSize: 11, color: 'var(--muted2)' }}>
                <span><b style={{ color: 'var(--accent)' }}>{mc.run_rate}</b> RR</span>
                <span><b style={{ color: 'var(--text)' }}>Inn {mc.innings}</b></span>
                <span style={{ color: minLeft <= 8 ? 'var(--red)' : 'var(--yellow)' }}><b>{minLeft > 0 ? `${minLeft}m` : 'NOW'}</b> {mc.next_break_type}</span>
              </div>

              <div style={{ width: 1, height: 28, background: 'var(--border)', flexShrink: 0 }} />

              {/* Event + vibe */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 700, marginBottom: 1 }}>⚡ {mc.recent_event}</div>
                <div style={{ fontSize: 10, color: 'var(--muted)' }}>
                  {mc.attendance?.toLocaleString()} fans · {sm.emoji} {mc.overall_crowd_sentiment.toFixed(2)} vibe ·
                  <b style={{ color: mc.crowd_density === 'HIGH' ? 'var(--red)' : mc.crowd_density === 'MEDIUM' ? 'var(--yellow)' : 'var(--green)' }}> {mc.crowd_density}</b>
                </div>
              </div>

              {/* Live/API badge */}
              <div style={{ flexShrink: 0 }}>
                {mc._live_api
                  ? <span className="chip" style={{ background: 'var(--green-d)', color: 'var(--green)', fontSize: 9.5, border: '1px solid rgba(34,197,94,0.3)' }}>🟢 LIVE API</span>
                  : <span className="chip" style={{ background: 'rgba(255,255,255,0.04)', color: 'var(--muted)', fontSize: 9.5 }}>⚙️ SIMULATED</span>
                }
              </div>
            </div>
          );
        })()}

        {/* Section heading */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 14 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16 }}>Live Zone Status</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 3 }}>
              Real-time occupancy · crowd emotions · wait times
            </div>
          </div>
          <span style={{ fontSize: 11, color: 'var(--muted)' }}>Auto-refresh 10s</span>
        </div>

        {/* Zone grid */}
        {!zones ? (
          <div className="zone-grid">
            {[1,2,3,4,5].map(i => <div key={i} className="shimmer-box" style={{ height: 300 }} />)}
          </div>
        ) : (
          <div className="zone-grid">
            {Object.entries(zones).map(([key, zone]) => (
              <ZoneCard key={key} zoneKey={key} zone={zone} />
            ))}
          </div>
        )}
      </div>

    </div>

    {/* Demo controls FAB */}
    <DemoPanel onRefresh={refresh} onSimResult={handleSimResult} />

    {/* Floating chat bot FAB */}
    <FloatingChat />

    {/* Alert panel overlay */}
    {showAlerts && (
      <AlertPanel
        alerts={alerts}
        onClose={() => setShowAlerts(false)}
        onAcknowledge={acknowledgeAlert}
        onRefresh={async () => {
          try {
            const data = await api('/alerts/check', { method: 'POST' });
            const all = data.all_alerts || [];
            const fresh = all.filter(a => !seenIds.current.has(a.id));
            fresh.forEach(a => { seenIds.current.add(a.id); addToast(a); });
            setAlerts(all);
          } catch {}
        }}
      />
    )}

    {/* Toast notifications */}
    <ToastContainer toasts={toasts} onDismiss={id => setToasts(t => t.filter(x => x.toastId !== id))} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
