<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueIQ — Crowd Intelligence</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:        #0b0f18;
      --sidebar:   #0f1521;
      --card:      #141d2e;
      --card2:     #1a2540;
      --border:    #1e2d47;
      --border2:   #243352;
      --text:      #e2e8f0;
      --muted:     #4b607a;
      --muted2:    #7a93b0;
      --accent:    #f97316;
      --accent-d:  rgba(249,115,22,0.14);
      --accent-b:  rgba(249,115,22,0.28);
      --green:     #22c55e;
      --green-d:   rgba(34,197,94,0.13);
      --yellow:    #eab308;
      --yellow-d:  rgba(234,179,8,0.13);
      --red:       #ef4444;
      --red-d:     rgba(239,68,68,0.13);
      --blue:      #3b82f6;
      --blue-d:    rgba(59,130,246,0.13);
      --purple:    #a855f7;
      --purple-d:  rgba(168,85,247,0.13);
      --pink:      #ec4899;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    button, input, select { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; color: inherit; }
    input, select { outline: none; }

    /* Layout grid */
    .layout {
      display: grid;
      grid-template-columns: 214px 1fr 300px;
      grid-template-rows: 58px 1fr;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar     { grid-column: 1; grid-row: 1 / 3; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .topbar      { grid-column: 2; grid-row: 1; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
    .main        { grid-column: 2; grid-row: 2; overflow-y: auto; padding: 20px; }
    .right       { grid-column: 3; grid-row: 1 / 3; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .card:hover { border-color: var(--border2); }

    /* Nav item */
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 12px; border-radius: 8px;
      font-size: 12.5px; font-weight: 500;
      color: var(--muted2); cursor: pointer;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .nav-item:hover  { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: var(--accent-d); color: var(--accent); }

    /* Section label */
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: .9px;
      color: var(--muted); padding: 4px 12px; margin-top: 16px; margin-bottom: 2px;
    }

    /* Animations */
    @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer   { 0%{background-position:-800px 0} 100%{background-position:800px 0} }
    .live-dot  { animation: pulse 1.6s ease-in-out infinite; }
    .fade-in   { animation: fadeSlide .3s ease forwards; }
    .shimmer-box {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 1600px 100%; animation: shimmer 1.8s linear infinite;
      border-radius: 12px;
    }

    /* Zone card grid */
    .zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Stat chips */
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 600; letter-spacing: .2px;
    }

    /* Input style */
    .input-base {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12.5px;
      transition: border-color .15s;
    }
    .input-base:focus { border-color: var(--accent); }
    .input-base::placeholder { color: var(--muted); }

    /* Icon box */
    .icon-box {
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── helpers ──────────────────────────────────────────────────────────── */
const zoneIcon = k => k.includes('bathroom') ? '🚻' : k.includes('food') ? '🍕' : '🏆';
const zoneCat  = k => k.includes('bathroom') ? 'BATHROOM' : k.includes('food') ? 'FOOD' : 'SEATING';

const occMeta = pct => pct < 50
  ? { color: 'var(--green)',  dim: 'var(--green-d)',  label: 'CLEAR'    }
  : pct < 75
  ? { color: 'var(--yellow)', dim: 'var(--yellow-d)', label: 'MODERATE' }
  : { color: 'var(--red)',    dim: 'var(--red-d)',     label: 'CROWDED'  };

const sentMeta = s => s >= 0.70
  ? { color: 'var(--green)',  emoji: '😊', label: 'Happy'     }
  : s >= 0.55
  ? { color: 'var(--yellow)', emoji: '😐', label: 'Neutral'   }
  : { color: 'var(--red)',    emoji: '😤', label: 'Frustrated' };

const fmtTime = iso => {
  try {
    const d = new Date(iso), diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    return d.toLocaleTimeString();
  } catch { return '--'; }
};

const api = (path, opts) => fetch(path, opts).then(r => r.json());

/* ── CircleGauge ──────────────────────────────────────────────────────── */
function CircleGauge({ pct, color, size = 76, sw = 7 }) {
  const r = (size - sw * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - Math.min(pct, 100) / 100);
  const c = size / 2;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', display: 'block' }}>
        <circle cx={c} cy={c} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw} />
        <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={offset}
          style={{ transition: 'stroke-dashoffset .7s cubic-bezier(.4,0,.2,1), stroke .5s ease' }}
        />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: size * 0.195, fontWeight: 800, color, lineHeight: 1 }}>{pct}%</span>
      </div>
    </div>
  );
}

/* ── MiniBar ──────────────────────────────────────────────────────────── */
function MiniBar({ val, color }) {
  return (
    <div style={{ flex: 1, height: 4, borderRadius: 99, background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>
      <div style={{ width: `${val}%`, height: '100%', borderRadius: 99, background: color, transition: 'width .6s ease' }} />
    </div>
  );
}

/* ── ZoneCard ─────────────────────────────────────────────────────────── */
function ZoneCard({ zoneKey, zone }) {
  const pct  = zone.occupancy_percent;
  const om   = occMeta(pct);
  const sm   = sentMeta(zone.emotion.avg_sentiment_score);

  return (
    <div className="card fade-in" style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 14, transition: 'border-color .2s' }}
      onMouseEnter={e => e.currentTarget.style.borderColor = om.color}
      onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
    >
      {/* ── row 1: identity + gauge ── */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
        <div style={{ flex: 1 }}>
          {/* zone icon + name */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 10 }}>
            <div className="icon-box" style={{ width: 36, height: 36, background: om.dim, fontSize: 17 }}>
              {zoneIcon(zoneKey)}
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 13, lineHeight: 1.25 }}>{zone.name}</div>
              <span className="chip" style={{ background: om.dim, color: om.color, marginTop: 3, display: 'inline-flex', fontSize: 9 }}>
                {om.label}
              </span>
            </div>
          </div>

          {/* capacity bar */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
              <span style={{ fontSize: 11, color: 'var(--muted2)' }}>Occupancy</span>
              <span style={{ fontSize: 11, color: 'var(--muted2)' }}>{zone.count} / {zone.capacity}</span>
            </div>
            <div style={{ height: 6, background: 'rgba(255,255,255,0.06)', borderRadius: 99, overflow: 'hidden' }}>
              <div style={{ width: `${pct}%`, height: '100%', background: om.color, borderRadius: 99, transition: 'width .7s ease' }} />
            </div>
          </div>

          {/* wait time */}
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5 }}>
            <span style={{ fontSize: 26, fontWeight: 800, lineHeight: 1, color: om.color }}>{zone.wait_time_min}</span>
            <span style={{ fontSize: 12, color: 'var(--muted2)' }}>min wait</span>
          </div>
        </div>

        {/* gauge */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <CircleGauge pct={pct} color={om.color} size={78} sw={7} />
          <span style={{ fontSize: 10, color: 'var(--muted)' }}>occupancy</span>
        </div>
      </div>

      {/* ── divider ── */}
      <div style={{ height: 1, background: 'var(--border)' }} />

      {/* ── emotion rows ── */}
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 9 }}>
          <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, letterSpacing: .7 }}>CROWD EMOTION</span>
          <span style={{ fontSize: 12, fontWeight: 800, color: sm.color }}>
            {sm.emoji} {zone.emotion.avg_sentiment_score.toFixed(2)} &nbsp;
            <span style={{ fontSize: 10, fontWeight: 600, color: 'var(--muted2)' }}>{sm.label}</span>
          </span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {[
            { emoji: '😊', key: 'happy',      color: 'var(--green)'  },
            { emoji: '😐', key: 'neutral',    color: 'var(--blue)'   },
            { emoji: '😞', key: 'sad',        color: 'var(--muted2)' },
            { emoji: '😤', key: 'frustrated', color: 'var(--red)'    },
          ].map(({ emoji, key, color }) => (
            <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
              <span style={{ fontSize: 13, width: 20 }}>{emoji}</span>
              <MiniBar val={zone.emotion[key]} color={color} />
              <span style={{ fontSize: 11, color: 'var(--muted)', minWidth: 30, textAlign: 'right' }}>
                {zone.emotion[key]}%
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* ── footer ── */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 10, color: 'var(--muted)' }}>Updated {fmtTime(zone.last_updated)}</span>
        <div style={{ width: 7, height: 7, borderRadius: '50%', background: om.color }} className="live-dot" />
      </div>
    </div>
  );
}

/* ── StatCard ─────────────────────────────────────────────────────────── */
function StatCard({ icon, label, value, sub, color, dim }) {
  return (
    <div className="card" style={{ padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 14 }}>
      <div className="icon-box" style={{ width: 46, height: 46, background: dim, fontSize: 21 }}>{icon}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 10.5, color: 'var(--muted)', letterSpacing: .6, fontWeight: 700, marginBottom: 3 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 800, color, lineHeight: 1 }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>{sub}</div>}
      </div>
    </div>
  );
}

/* ── MatchPanel ───────────────────────────────────────────────────────── */
function MatchPanel({ stats }) {
  if (!stats) return <div className="shimmer-box" style={{ height: 220, margin: 14 }} />;
  const mc  = stats.match_context;
  const min = mc.next_break_minute - mc.current_minute;
  const sm  = sentMeta(mc.overall_crowd_sentiment);

  return (
    <div style={{ padding: '14px 14px 0' }}>
      <div className="sec-label" style={{ marginTop: 0, padding: 0, marginBottom: 10 }}>MATCH CONTEXT</div>

      {/* Teams */}
      <div className="card" style={{
        padding: '14px 16px', marginBottom: 10,
        background: 'linear-gradient(135deg,rgba(249,115,22,0.08),rgba(249,115,22,0.02))',
        borderColor: 'var(--accent-b)',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 26, fontWeight: 900, color: '#ff4444', lineHeight: 1 }}>{mc.team_a}</div>
            <div style={{ fontSize: 9.5, color: 'var(--muted)', letterSpacing: .8, marginTop: 2 }}>TEAM A</div>
          </div>
          <div style={{ background: 'var(--accent)', borderRadius: 8, padding: '5px 12px', fontSize: 12, fontWeight: 900, color: '#fff' }}>VS</div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 26, fontWeight: 900, color: 'var(--blue)', lineHeight: 1 }}>{mc.team_b}</div>
            <div style={{ fontSize: 9.5, color: 'var(--muted)', letterSpacing: .8, marginTop: 2 }}>TEAM B</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 8, padding: '8px 10px' }}>
            <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 2 }}>MINUTE</div>
            <div style={{ fontSize: 20, fontWeight: 800 }}>{mc.current_minute}</div>
          </div>
          <div style={{ background: min <= 5 ? 'var(--red-d)' : 'rgba(255,255,255,0.04)', borderRadius: 8, padding: '8px 10px' }}>
            <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 2 }}>NEXT BREAK</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: min <= 5 ? 'var(--red)' : 'var(--yellow)' }}>
              {min > 0 ? `${min}m` : 'NOW!'}
            </div>
          </div>
        </div>
      </div>

      {/* Event */}
      <div className="card" style={{ padding: '10px 12px', marginBottom: 10, borderColor: 'var(--accent-b)', background: 'var(--accent-d)' }}>
        <div style={{ fontSize: 9.5, color: 'var(--accent)', fontWeight: 700, letterSpacing: .8, marginBottom: 4 }}>⚡ LATEST EVENT</div>
        <div style={{ fontSize: 12.5, fontWeight: 600, lineHeight: 1.5 }}>{mc.recent_event}</div>
      </div>

      {/* Vibe */}
      <div className="card" style={{ padding: '12px 14px', marginBottom: 10 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
          <span style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700, letterSpacing: .7 }}>VENUE VIBE</span>
          <span style={{ fontSize: 13, fontWeight: 800, color: sm.color }}>{sm.emoji} {mc.overall_crowd_sentiment.toFixed(2)}</span>
        </div>
        <div style={{ height: 6, borderRadius: 99, background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>
          <div style={{ width: `${mc.overall_crowd_sentiment * 100}%`, height: '100%', borderRadius: 99, background: sm.color, transition: 'width .6s ease' }} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
          <span style={{ fontSize: 10, color: 'var(--muted)' }}>Density: <b style={{ color: mc.crowd_density === 'HIGH' ? 'var(--red)' : mc.crowd_density === 'MEDIUM' ? 'var(--yellow)' : 'var(--green)' }}>{mc.crowd_density}</b></span>
          <span style={{ fontSize: 10, color: sm.color }}>{sm.label}</span>
        </div>
      </div>
    </div>
  );
}

/* ── ChatPanel ────────────────────────────────────────────────────────── */
function ChatPanel() {
  const [q, setQ]         = useState('');
  const [msgs, setMsgs]   = useState([]);
  const [busy, setBusy]   = useState(false);
  const endRef            = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const QUICK = [
    'Where should I go to the bathroom?',
    'Which food area is best right now?',
    'Which zone has most frustrated fans?',
    'Give me a full venue status report',
  ];

  const TOOL_COLORS = {
    get_all_zones:          ['var(--blue)',   'var(--blue-d)'   ],
    get_zone_status:        ['var(--purple)', 'var(--purple-d)' ],
    get_match_context:      ['var(--accent)', 'var(--accent-d)' ],
    recommend_zone:         ['var(--green)',  'var(--green-d)'  ],
    get_sentiment_insights: ['var(--pink)',   'var(--purple-d)' ],
  };

  const send = async (text) => {
    const msg = (text || q).trim();
    if (!msg || busy) return;
    setQ('');
    setBusy(true);
    setMsgs(m => [...m, { role: 'user', text: msg }]);
    try {
      const res = await api('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: msg }),
      });
      setMsgs(m => [...m, { role: 'agent', text: res.answer, tools: res.tools_used }]);
    } catch (e) {
      setMsgs(m => [...m, { role: 'agent', text: '⚠️ ' + e.message, tools: [] }]);
    }
    setBusy(false);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, borderTop: '1px solid var(--border)', minHeight: 0, overflow: 'hidden' }}>
      {/* header */}
      <div style={{ padding: '11px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 9, flexShrink: 0 }}>
        <div className="icon-box" style={{ width: 32, height: 32, background: 'var(--accent-d)', fontSize: 15 }}>🤖</div>
        <div>
          <div style={{ fontWeight: 700, fontSize: 13 }}>VenueIQ Agent</div>
          <div style={{ fontSize: 10, color: 'var(--green)', display: 'flex', alignItems: 'center', gap: 4, marginTop: 1 }}>
            <span className="live-dot" style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--green)', display: 'inline-block' }} />
            Gemini 2.0 Flash · Tool Use
          </div>
        </div>
      </div>

      {/* messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '12px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {msgs.length === 0 && (
          <div>
            <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 8, padding: '0 2px' }}>Try asking:</div>
            {QUICK.map(q => (
              <button key={q} onClick={() => send(q)} style={{
                width: '100%', textAlign: 'left', padding: '8px 10px', marginBottom: 4,
                background: 'rgba(255,255,255,0.025)', border: '1px solid var(--border)',
                borderRadius: 8, color: 'var(--muted2)', fontSize: 11.5, lineHeight: 1.45,
                transition: 'all .15s',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--text)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)';  e.currentTarget.style.color = 'var(--muted2)'; }}
              >{q}</button>
            ))}
          </div>
        )}

        {msgs.map((m, i) => (
          <div key={i} className="fade-in" style={{ display: 'flex', flexDirection: 'column', alignItems: m.role === 'user' ? 'flex-end' : 'flex-start', gap: 5 }}>
            <div style={{
              maxWidth: '91%', padding: '9px 12px', fontSize: 12, lineHeight: 1.65,
              borderRadius: m.role === 'user' ? '10px 10px 2px 10px' : '10px 10px 10px 2px',
              background: m.role === 'user'
                ? 'linear-gradient(135deg,var(--accent),#fb923c)'
                : 'var(--card2)',
              border: m.role === 'user' ? 'none' : '1px solid var(--border)',
              color: m.role === 'user' ? '#fff' : 'var(--text)',
            }}>{m.text}</div>

            {m.tools && m.tools.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                {m.tools.map(t => {
                  const [c, d] = TOOL_COLORS[t] || ['var(--muted2)', 'rgba(255,255,255,0.05)'];
                  return (
                    <span key={t} className="chip" style={{ background: d, color: c, border: `1px solid ${c}40`, fontSize: 10 }}>
                      ⚡ {t.replace(/_/g, ' ')}
                    </span>
                  );
                })}
              </div>
            )}
          </div>
        ))}

        {busy && (
          <div className="fade-in" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ display: 'flex', gap: 3 }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', animation: `pulse 1.2s ${i * .22}s infinite` }} />
              ))}
            </div>
            <span style={{ fontSize: 11, color: 'var(--muted)' }}>Analysing zones...</span>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* input */}
      <div style={{ padding: '10px 12px', borderTop: '1px solid var(--border)', display: 'flex', gap: 7, flexShrink: 0 }}>
        <input
          value={q}
          onChange={e => setQ(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && send()}
          placeholder="Ask the agent..."
          className="input-base"
          style={{ flex: 1, padding: '8px 11px' }}
        />
        <button
          onClick={() => send()}
          disabled={busy || !q.trim()}
          style={{
            padding: '8px 16px', borderRadius: 8, fontWeight: 700, fontSize: 12,
            background: busy || !q.trim() ? 'rgba(255,255,255,0.04)' : 'var(--accent)',
            color:      busy || !q.trim() ? 'var(--muted)' : '#fff',
            transition: 'all .15s',
          }}
        >{busy ? '•••' : 'Ask'}</button>
      </div>
    </div>
  );
}

/* ── Sidebar ──────────────────────────────────────────────────────────── */
function Sidebar({ onRefresh }) {
  const [status, setStatus] = useState('');

  const ZONES = [
    { key: 'bathroom_north', label: '🚻 North Bathroom' },
    { key: 'bathroom_south', label: '🚻 South Bathroom' },
    { key: 'food_concourse_a', label: '🍕 Food A'        },
    { key: 'food_concourse_b', label: '🍕 Food B'        },
    { key: 'seating_premium', label: '🏆 Premium Seats'  },
  ];
  const EVENTS = [
    { name: '💀 Wicket! Crowd surge ahead',  short: '💀 Wicket!'      },
    { name: '💥 SIX! Crowd going wild',       short: '💥 SIX hit!'    },
    { name: '🏏 FOUR! Boundary!',             short: '🏏 FOUR!'       },
    { name: '☕ Drinks break announced',      short: '☕ Drinks Break' },
    { name: '🍽️ Lunch break announced',      short: '🍽️ Lunch Break' },
  ];

  const doSim = async (action, payload) => {
    try {
      await api('/simulate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload }),
      });
      setStatus('✅');
      onRefresh();
    } catch { setStatus('❌'); }
    setTimeout(() => setStatus(''), 2000);
  };

  const SideBtn = ({ onClick, children, hoverColor = 'rgba(255,255,255,0.05)', hoverText = 'var(--text)' }) => (
    <button onClick={onClick} style={{
      width: '100%', textAlign: 'left', padding: '7px 12px',
      borderRadius: 7, fontSize: 12, color: 'var(--muted2)', transition: 'all .15s',
    }}
    onMouseEnter={e => { e.currentTarget.style.background = hoverColor; e.currentTarget.style.color = hoverText; }}
    onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--muted2)'; }}
    >{children}</button>
  );

  return (
    <div className="sidebar">
      {/* Logo */}
      <div style={{ padding: '18px 16px 14px', borderBottom: '1px solid var(--border)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div className="icon-box" style={{ width: 38, height: 38, background: 'var(--accent-d)', border: '1px solid var(--accent-b)', fontSize: 19 }}>🏟️</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 17, letterSpacing: -.3 }}>
              Venue<span style={{ color: 'var(--accent)' }}>IQ</span>
            </div>
            <div style={{ fontSize: 9.5, color: 'var(--muted)', letterSpacing: .7 }}>CROWD INTELLIGENCE</div>
          </div>
        </div>
      </div>

      {/* Scrollable nav */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 8px' }}>
        {/* Nav */}
        <div className="sec-label" style={{ marginTop: 4 }}>NAVIGATION</div>
        {[
          { icon: '⚡', label: 'Live Overview',  active: true },
          { icon: '🗺️', label: 'Zone Map'                   },
          { icon: '🏏', label: 'Match Context'               },
          { icon: '📊', label: 'Analytics'                   },
        ].map(item => (
          <div key={item.label} className={`nav-item${item.active ? ' active' : ''}`} style={{ position: 'relative' }}>
            <span>{item.icon}</span>
            <span>{item.label}</span>
            {item.active && (
              <div style={{ marginLeft: 'auto', width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)' }} />
            )}
          </div>
        ))}

        {/* Surge */}
        <div className="sec-label">SURGE ZONE</div>
        {ZONES.map(z => (
          <SideBtn key={z.key}
            onClick={() => doSim('surge', { zone_name: z.key })}
            hoverColor="var(--red-d)" hoverText="var(--red)"
          >
            🌊 {z.label}
          </SideBtn>
        ))}

        {/* Events */}
        <div className="sec-label">MATCH EVENTS</div>
        {EVENTS.map(ev => (
          <SideBtn key={ev.name}
            onClick={() => doSim('event', { event_name: ev.name })}
            hoverColor="var(--accent-d)" hoverText="var(--accent)"
          >
            {ev.short}
          </SideBtn>
        ))}
      </div>

      {/* Bottom: reset + status */}
      <div style={{ padding: '10px 10px 14px', borderTop: '1px solid var(--border)' }}>
        <button onClick={() => doSim('reset', {})}
          style={{
            width: '100%', padding: '9px', borderRadius: 8, fontSize: 12, fontWeight: 600,
            background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)',
            color: 'var(--muted2)', transition: 'all .15s',
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--accent)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--muted2)'; }}
        >🔄 Reset All Data</button>
        {status && (
          <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--green)', marginTop: 6 }}>{status}</div>
        )}
        <div style={{ textAlign: 'center', fontSize: 10, color: 'var(--muted)', marginTop: 10 }}>
          Build with AI · Ahmedabad 2026
        </div>
      </div>
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────────── */
function App() {
  const [zones,  setZones]  = useState(null);
  const [stats,  setStats]  = useState(null);
  const [lastTs, setLastTs] = useState(null);
  const [err,    setErr]    = useState(null);

  const refresh = useCallback(async () => {
    try {
      const [z, s] = await Promise.all([api('/zones'), api('/stats')]);
      setZones(z); setStats(s);
      setLastTs(new Date()); setErr(null);
    } catch { setErr('Cannot reach server — is app.py running on :8000?'); }
  }, []);

  useEffect(() => { refresh(); }, []);
  useEffect(() => { const id = setInterval(refresh, 10000); return () => clearInterval(id); }, [refresh]);

  const occList = zones ? Object.values(zones).map(z => z.occupancy_percent) : [];
  const critCount = occList.filter(p => p >= 75).length;
  const modCount  = occList.filter(p => p >= 50 && p < 75).length;
  const clrCount  = occList.filter(p => p < 50).length;

  return (
    <div className="layout">
      {/* Sidebar */}
      <Sidebar onRefresh={refresh} />

      {/* Top bar */}
      <div className="topbar">
        {/* search */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 9,
          background: 'var(--card)', border: '1px solid var(--border)',
          borderRadius: 9, padding: '7px 13px', flex: '0 0 260px',
        }}>
          <span style={{ fontSize: 14, color: 'var(--muted)' }}>🔍</span>
          <input placeholder="Search zones, events..." className="input-base"
            style={{ background: 'transparent', border: 'none', flex: 1, fontSize: 12.5, borderRadius: 0 }} />
        </div>

        <div style={{ flex: 1 }} />

        {lastTs && (
          <span style={{ fontSize: 11, color: 'var(--muted)' }}>
            Last update: {lastTs.toLocaleTimeString()}
          </span>
        )}

        {/* zone status chips */}
        {zones && (
          <div style={{ display: 'flex', gap: 6 }}>
            {critCount > 0 && <span className="chip" style={{ background: 'var(--red-d)',    color: 'var(--red)'    }}>{critCount} Critical</span>}
            {modCount  > 0 && <span className="chip" style={{ background: 'var(--yellow-d)', color: 'var(--yellow)' }}>{modCount} Moderate</span>}
            {clrCount  > 0 && <span className="chip" style={{ background: 'var(--green-d)',  color: 'var(--green)'  }}>{clrCount} Clear</span>}
          </div>
        )}

        {/* LIVE badge */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 6,
          background: 'var(--red-d)', border: '1px solid rgba(239,68,68,0.3)',
          borderRadius: 99, padding: '5px 13px',
        }}>
          <span className="live-dot" style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--red)', display: 'inline-block' }} />
          <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--red)', letterSpacing: 1 }}>LIVE</span>
        </div>

        <button onClick={refresh}
          style={{
            padding: '6px 12px', borderRadius: 8, fontSize: 13, fontWeight: 700,
            background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--muted2)',
            transition: 'all .15s',
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--text)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--muted2)'; }}
        >↻</button>
      </div>

      {/* Main */}
      <div className="main">
        {err && (
          <div style={{
            background: 'var(--red-d)', border: '1px solid rgba(239,68,68,0.25)',
            borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 12, color: 'var(--red)',
          }}>⚠️ {err}</div>
        )}

        {/* Stat cards */}
        {stats ? (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 22 }}>
            <StatCard icon="👥" label="AVG OCCUPANCY"
              value={`${stats.avg_occupancy_percent}%`}
              sub="across all zones"
              color={stats.avg_occupancy_percent < 60 ? 'var(--green)' : stats.avg_occupancy_percent < 80 ? 'var(--yellow)' : 'var(--red)'}
              dim={stats.avg_occupancy_percent < 60 ? 'var(--green-d)' : stats.avg_occupancy_percent < 80 ? 'var(--yellow-d)' : 'var(--red-d)'}
            />
            <StatCard icon="❤️" label="CROWD VIBE"
              value={stats.avg_sentiment_score.toFixed(2)}
              sub={sentMeta(stats.avg_sentiment_score).label + ' mood'}
              color={sentMeta(stats.avg_sentiment_score).color}
              dim="var(--purple-d)"
            />
            <StatCard icon="🚨" label="BUSY ZONES"
              value={critCount}
              sub={`${clrCount} zone${clrCount !== 1 ? 's' : ''} clear right now`}
              color={critCount >= 2 ? 'var(--red)' : critCount === 1 ? 'var(--yellow)' : 'var(--green)'}
              dim={critCount >= 2 ? 'var(--red-d)' : 'var(--yellow-d)'}
            />
            <StatCard icon="⏰" label="NEXT BREAK"
              value={`${stats.match_context.next_break_minute - stats.match_context.current_minute}m`}
              sub={`Min ${stats.match_context.current_minute} of ${stats.match_context.next_break_minute}`}
              color="var(--yellow)"
              dim="var(--yellow-d)"
            />
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 22 }}>
            {[1,2,3,4].map(i => <div key={i} className="shimmer-box" style={{ height: 82 }} />)}
          </div>
        )}

        {/* Section heading */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 14 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16 }}>Live Zone Status</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 3 }}>
              Real-time occupancy · crowd emotions · wait times
            </div>
          </div>
          <span style={{ fontSize: 11, color: 'var(--muted)' }}>Auto-refresh 10s</span>
        </div>

        {/* Zone grid */}
        {!zones ? (
          <div className="zone-grid">
            {[1,2,3,4,5].map(i => <div key={i} className="shimmer-box" style={{ height: 300 }} />)}
          </div>
        ) : (
          <div className="zone-grid">
            {Object.entries(zones).map(([key, zone]) => (
              <ZoneCard key={key} zoneKey={key} zone={zone} />
            ))}
          </div>
        )}
      </div>

      {/* Right panel */}
      <div className="right">
        <MatchPanel stats={stats} />
        <ChatPanel />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
