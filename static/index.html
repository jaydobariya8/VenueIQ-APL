<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueIQ — AI Crowd Intelligence</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.400.0"></script>
  <style>
    :root {
      /* Theme Variables */
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --accent: #16a34a; 
      --accent-soft: rgba(22, 163, 74, 0.08);
      --accent-hover: #15803d;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }

    [data-theme="dark"] {
      --bg-primary: #05070a;
      --bg-secondary: #0a0c12;
      --bg-sidebar: #0a0c12;
      --bg-card: #11141d;
      --bg-card-hover: #181c27;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --border: #1e293b;
      --accent: #10b981;
      --accent-soft: rgba(16, 185, 129, 0.1);
      --accent-hover: #34d399;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-primary); color: var(--text-primary); transition: background 0.3s, color 0.3s; height: 100vh; overflow: hidden; }
    
    /* Layout */
    .app-container { display: flex; height: 100vh; width: 100vw; }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
    .logo-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 20px;
    }
    .logo-text { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }

    .nav-section { margin-bottom: 32px; }
    .nav-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      border-radius: var(--radius); color: var(--text-secondary);
      text-decoration: none; font-size: 14px; font-weight: 500;
      transition: all 0.2s; cursor: pointer; margin-bottom: 4px;
    }
    .nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-soft); color: var(--accent); }
    .nav-item i { width: 18px; }

    .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }
    
    /* Main Content */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; position: relative; }
    
    /* Top Header */
    .header {
      padding: 24px 40px; display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-primary); position: sticky; top: 0; z-index: 100;
    }
    .header-left h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
    .header-left p { color: var(--text-secondary); font-size: 14px; }
    .header-right { display: flex; align-items: center; gap: 16px; }

    /* Action Buttons */
    .btn-icon {
      width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; position: relative;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .badge-dot {
      position: absolute; top: 8px; right: 8px; width: 8px; height: 8px;
      background: var(--danger); border-radius: 50%; border: 2px solid var(--bg-card);
    }

    /* Content Area */
    .content-scroll { padding: 0 40px 40px 40px; }
    
    /* Stats Row */
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; transition: all 0.3s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-icon {
      width: 32px; height: 32px; border-radius: 8px; display: flex;
      align-items: center; justify-content: center; margin-bottom: 12px;
      font-size: 18px;
    }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Match Context Card */
    .match-banner {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
      padding: 24px; margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .match-banner::before {
      content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent);
    }
    .match-grid { display: grid; grid-template-columns: 1.5fr 1fr 2fr; gap: 24px; align-items: center; }

    /* Zone Grid */
    .zone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
      padding: 24px; transition: all 0.3s; display: flex; flex-direction: column; gap: 20px;
    }
    .zone-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    
    .zone-header { display: flex; justifyContent: space-between; align-items: flex-start; }
    .zone-info { display: flex; gap: 12px; }
    .zone-icon {
      width: 44px; height: 44px; border-radius: 12px; background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .zone-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .zone-cat { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }

    .occupancy-ring { position: relative; width: 64px; height: 64px; }
    .occupancy-val {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 14px;
    }

    .wait-stat { margin-top: 4px; }
    .wait-val { font-size: 32px; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .wait-label { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }

    .emotion-bars { display: flex; flex-direction: column; gap: 8px; }
    .emotion-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .progress-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

    /* Floating Chat */
    .chat-fab {
      position: fixed; bottom: 32px; right: 32px; width: 64px; height: 64px;
      background: var(--accent); color: white; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }
    .chat-fab:hover { transform: scale(1.05) translateY(-4px); }
    
    .chat-window {
      position: fixed; bottom: 108px; right: 32px; width: 420px; height: 600px;
      background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column;
      overflow: hidden; z-index: 1000; transform-origin: bottom right;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .chat-suggestion {
      padding: 8px 12px; background: var(--bg-card-hover); border: 1px solid var(--border);
      border-radius: 12px; font-size: 12px; cursor: pointer; transition: all 0.2s;
      color: var(--text-secondary); font-weight: 500;
    }
    .chat-suggestion:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    .pulse { animation: pulse 2s infinite; }

    @keyframes livePulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    .live-button-highlight {
      animation: livePulse 2s infinite;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }

    /* Skeleton */
    .shimmer {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%; animation: shimmerAnim 1.5s infinite;
    }
    @keyframes shimmerAnim { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ── Components ────────────────────────────────────────────────────────── */

    const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
      useEffect(() => {
        try {
          if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
          }
        } catch (e) { }
      }, [name]);
      return <i data-lucide={name} className={className} style={{ width: size, height: size, color: color }}></i>;
    };

    const ThemeToggle = ({ theme, toggle }) => (
      <div className="nav-item" onClick={toggle}>
        <Icon name={theme === 'dark' ? 'sun' : 'moon'} />
        <span>{theme === 'dark' ? 'Light Mode' : 'Dark Mode'}</span>
      </div>
    );

    const StatCard = ({ icon, label, value, sub, color, bg }) => (
      <div className="stat-card fade-in">
        <div className="stat-icon" style={{ background: bg, color: color }}>
          {icon}
        </div>
        <div className="stat-label">{label}</div>
        <div className="stat-value">{value}</div>
        <div className="stat-sub">{sub}</div>
      </div>
    );

    const ZoneCard = ({ zone, zoneKey }) => {
      const pct = zone.occupancy_percent || 0;
      const getStatusColor = (p) => p < 50 ? 'var(--success)' : p < 75 ? 'var(--warning)' : 'var(--danger)';
      const color = getStatusColor(pct);
      
      return (
        <div className="zone-card fade-in">
          <div className="zone-header">
            <div className="zone-info">
              <div className="zone-icon">
                {zoneKey.includes('restroom') ? '🚻' : zoneKey.includes('concession') ? '🍕' : '🏆'}
              </div>
              <div>
                <div className="zone-name">{zone.name}</div>
                <div className="zone-cat">{zone.zone_id} • {zone.section}</div>
              </div>
            </div>
            <div className="occupancy-ring">
              <svg width="64" height="64" viewBox="0 0 64 64">
                <circle cx="32" cy="32" r="28" fill="none" stroke="var(--border)" strokeWidth="6" />
                <circle cx="32" cy="32" r="28" fill="none" stroke={color} strokeWidth="6" 
                  strokeDasharray={2 * Math.PI * 28} 
                  strokeDashoffset={2 * Math.PI * 28 * (1 - pct/100)}
                  strokeLinecap="round" transform="rotate(-90 32 32)"
                  style={{ transition: 'stroke-dashoffset 1s ease' }}
                />
              </svg>
              <div className="occupancy-val" style={{ color: color }}>{pct}%</div>
            </div>
          </div>

          <div className="wait-stat">
            <div className="stat-label">CURRENT WAIT</div>
            <div style={{ display: 'flex', alignItems: 'baseline' }}>
              <span className="wait-val" style={{ color: color }}>{zone.wait_time_min}</span>
              <span className="wait-label">minutes</span>
            </div>
          </div>

          <div className="emotion-bars">
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
              <span className="nav-label" style={{ margin: 0, fontSize: 9 }}>Crowd Sentiment</span>
              <span style={{ fontWeight: 700, fontSize: 12, color: 'var(--accent)' }}>
                {(zone.emotion.avg_sentiment_score || 0).toFixed(2)} Score
              </span>
            </div>
            {[
              { label: 'Happy', val: zone.emotion.happy, color: 'var(--success)' },
              { label: 'Neutral', val: zone.emotion.neutral, color: 'var(--accent)' },
              { label: 'Frustrated', val: zone.emotion.frustrated, color: 'var(--danger)' }
            ].map(em => (
              <div key={em.label} className="emotion-row">
                <span style={{ width: 60, color: 'var(--text-secondary)' }}>{em.label}</span>
                <div className="progress-bg">
                  <div className="progress-fill" style={{ width: `${em.val}%`, background: em.color }} />
                </div>
                <span style={{ width: 30, textAlign: 'right', fontWeight: 600 }}>{em.val}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ── Main App ──────────────────────────────────────────────────────────── */

    function App() {
      const [theme, setTheme] = useState(localStorage.getItem('theme') || 'dark');
      const [zones, setZones] = useState(null);
      const [stats, setStats] = useState(null);
      const [alerts, setAlerts] = useState([]);
      const [showChat, setShowChat] = useState(false);
      const [chatMsg, setChatMsg] = useState('');
      const [chatHistory, setChatHistory] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

      const fetchData = useCallback(async () => {
        try {
          const [z, s, a] = await Promise.all([
            fetch('/zones').then(r => r.json()),
            fetch('/stats').then(r => r.json()),
            fetch('/alerts').then(r => r.json())
          ]);
          setZones(z);
          setStats(s);
          setAlerts(a.alerts || []);
        } catch (e) { }
      }, []);

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 10000);
        return () => clearInterval(interval);
      }, [fetchData]);

      const handleAsk = async (e, forcedMsg) => {
        if (e) e.preventDefault();
        const msg = forcedMsg || chatMsg;
        if (!msg.trim() || loading) return;
        
        setChatMsg('');
        setChatHistory(prev => [...prev, { role: 'user', text: msg }]);
        setLoading(true);

        try {
          const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: msg })
          }).then(r => r.json());
          
          setChatHistory(prev => [...prev, { role: 'agent', text: res.answer, tools: res.tools_used }]);
        } catch (e) {
          setChatHistory(prev => [...prev, { role: 'agent', text: "Sorry, I'm having trouble connecting." }]);
        } finally {
          setLoading(false);
        }
      };

      const unreadAlerts = (alerts || []).filter(a => !a.acknowledged).length;

      return (
        <div className="app-container">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="logo-container" onClick={() => window.location.href = '/landing'} style={{ cursor: 'pointer' }}>
              <div className="logo-icon">V</div>
              <div className="logo-text">Venue<span>IQ</span></div>
            </div>

            <div className="nav-section">
              <div className="nav-label">Main Menu</div>
              <div className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
                <Icon name="layout-dashboard" />
                <span>Dashboard</span>
              </div>
              <div className={`nav-item ${activeTab === 'alerts' ? 'active' : ''}`} onClick={() => setActiveTab('alerts')}>
                <Icon name="bell" />
                <span>AI Alerts</span>
                {unreadAlerts > 0 && <span style={{ marginLeft: 'auto', background: 'var(--danger)', color: 'white', fontSize: 10, padding: '2px 6px', borderRadius: 10 }}>{unreadAlerts}</span>}
              </div>
            </div>

            <div className="nav-section">
              <div className="nav-label">System</div>
              <div className="nav-item">
                <Icon name="settings" />
                <span>Settings</span>
              </div>
              <ThemeToggle theme={theme} toggle={toggleTheme} />
            </div>

            <div className="sidebar-footer">
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 12, color: 'white' }}>JD</div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>Jay Dobariya</div>
                  <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>Admin • Ahmedabad</div>
                </div>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="main-content">
            <header className="header">
              <div className="header-left">
                <h1>{activeTab === 'dashboard' ? 'Dashboard' : 'AI Alerts'}</h1>
                <p>{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</p>
              </div>
              <div className="header-right">
                <div className="btn-icon" title="Notifications" onClick={() => setActiveTab('alerts')}>
                  <Icon name="bell" />
                  {unreadAlerts > 0 && <div className="badge-dot"></div>}
                </div>
                <div className="btn-icon" title="Refresh" onClick={fetchData}>
                  <Icon name="refresh-cw" />
                </div>
                <div 
                  onClick={() => window.location.href = '/demo'}
                  className="live-button-highlight"
                  style={{ padding: '10px 24px', background: 'var(--accent)', color: 'white', borderRadius: 12, fontSize: 14, fontWeight: 800, cursor: 'pointer', transition: 'all 0.2s', border: 'none' }}
                  onMouseOver={(e) => e.target.style.background = 'var(--accent-hover)'}
                  onMouseOut={(e) => e.target.style.background = 'var(--accent)'}
                >
                  Live Mode
                </div>
              </div>
            </header>

            <div className="content-scroll">
              {activeTab === 'dashboard' ? (
                <>
                  {stats ? (
                    <>
                      <div className="stats-grid">
                        <StatCard icon="👥" label="TOTAL CROWD" value={(stats.match_context?.attendance || 0).toLocaleString()} sub={`${stats.match_context?.attendance_pct || 0}% Capacity`} bg="var(--accent-soft)" color="var(--accent)" />
                        <StatCard icon="📊" label="AVG OCCUPANCY" value={`${stats.avg_occupancy_percent || 0}%`} sub="Across 5 Zones" bg="rgba(59, 130, 246, 0.1)" color="#3b82f6" />
                        <StatCard icon="😊" label="CROWD VIBE" value={(stats.avg_sentiment_score || 0).toFixed(2)} sub="Happier than usual" bg="rgba(16, 185, 129, 0.1)" color="#10b981" />
                        <StatCard icon="🚨" label="ACTIVE ALERTS" value={unreadAlerts} sub="Requires attention" bg="rgba(239, 68, 68, 0.1)" color="#ef4444" />
                        <StatCard icon="🏏" label="MATCH MINUTE" value={`${stats.match_context?.current_minute || 0}'`} sub="First Innings" bg="rgba(245, 158, 11, 0.1)" color="#f59e0b" />
                      </div>

                      <div className="match-banner fade-in">
                        <div className="match-grid">
                          <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                            <div style={{ textAlign: 'center' }}>
                              <div style={{ fontSize: 24, fontWeight: 900, color: '#ef4444' }}>{stats.match_context?.team_a}</div>
                              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)' }}>HOME</div>
                            </div>
                            <div style={{ textAlign: 'center', minWidth: 80 }}>
                              <div style={{ fontSize: 28, fontWeight: 900, color: 'var(--accent)' }}>{stats.match_context?.score}</div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-secondary)' }}>Over {stats.match_context?.overs}</div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                              <div style={{ fontSize: 24, fontWeight: 900, color: '#3b82f6' }}>{stats.match_context?.team_b}</div>
                              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)' }}>AWAY</div>
                            </div>
                          </div>
                          
                          <div style={{ borderLeft: '1px solid var(--border)', paddingLeft: 24 }}>
                            <div className="nav-label" style={{ margin: 0, fontSize: 10 }}>Live Event</div>
                            <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--accent)', marginTop: 4 }}>⚡ {stats.match_context?.recent_event}</div>
                            <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>Density: <b style={{color: stats.match_context?.crowd_density === 'HIGH' ? 'var(--danger)' : 'var(--success)'}}>{stats.match_context?.crowd_density}</b></div>
                          </div>

                          <div style={{ display: 'flex', gap: 12, justifyContent: 'flex-end' }}>
                            <div style={{ background: 'var(--bg-primary)', padding: '12px 20px', borderRadius: 16, border: '1px solid var(--border)', textAlign: 'center' }}>
                              <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700 }}>BREAK IN</div>
                              <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--warning)' }}>{(stats.match_context?.innings_break_minute || 90) - (stats.match_context?.current_minute || 0)}m</div>
                            </div>
                            <div style={{ background: 'var(--bg-primary)', padding: '12px 20px', borderRadius: 16, border: '1px solid var(--border)', textAlign: 'center' }}>
                              <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700 }}>RUN RATE</div>
                              <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent)' }}>{stats.match_context?.run_rate}</div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </>
                  ) : (
                    <div className="stats-grid">
                      {[1,2,3,4,5].map(i => <div key={i} className="stat-card shimmer" style={{ height: 120 }}></div>)}
                    </div>
                  )}

                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                    <div className="nav-label" style={{ margin: 0 }}>Zone Real-time Monitor</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--text-muted)' }}>
                      <div className="pulse" style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)' }}></div>
                      Auto-updating from sensor array
                    </div>
                  </div>

                  {zones ? (
                    <div className="zone-grid">
                      {Object.entries(zones).map(([key, zone]) => (
                        <ZoneCard key={key} zoneKey={key} zone={zone} />
                      ))}
                    </div>
                  ) : (
                    <div className="zone-grid">
                      {[1,2,3,4,5,6].map(i => <div key={i} className="zone-card shimmer" style={{ height: 300 }}></div>)}
                    </div>
                  )}
                </>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                   <div className="nav-label">Active System Alerts</div>
                   {(alerts || []).length === 0 ? (
                     <div style={{ padding: 40, textAlign: 'center', background: 'var(--bg-card)', borderRadius: 20, border: '1px solid var(--border)', color: 'var(--text-secondary)' }}>
                       No active alerts. System is stable.
                     </div>
                   ) : (
                     alerts.map(a => (
                       <div key={a.id} className="stat-card fade-in" style={{ 
                         display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                         borderLeft: `4px solid ${a.severity === 'CRITICAL' ? 'var(--danger)' : 'var(--warning)'}`,
                         opacity: a.acknowledged ? 0.6 : 1
                       }}>
                         <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
                           <div style={{ width: 48, height: 48, borderRadius: 12, background: a.severity === 'CRITICAL' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(245, 158, 11, 0.1)', color: a.severity === 'CRITICAL' ? 'var(--danger)' : 'var(--warning)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>
                             {a.severity === 'CRITICAL' ? '🚨' : '⚠️'}
                           </div>
                           <div>
                             <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                               <div style={{ fontWeight: 800, fontSize: 17 }}>{a.zone_name}</div>
                               <span style={{ fontSize: 10, background: a.severity === 'CRITICAL' ? 'var(--danger)' : 'var(--warning)', color: 'white', padding: '2px 8px', borderRadius: 20, fontWeight: 800 }}>{a.severity}</span>
                             </div>
                             <div style={{ fontSize: 14, color: 'var(--text-primary)', fontWeight: 500, marginTop: 4 }}>{a.staff_alert}</div>
                             <div style={{ display: 'flex', gap: 12, marginTop: 8 }}>
                               <div style={{ fontSize: 11, color: 'var(--text-muted)' }}><Icon name="clock" size={10} style={{ marginRight: 4 }} />{new Date(a.timestamp).toLocaleTimeString()}</div>
                               <div style={{ fontSize: 11, color: 'var(--text-muted)' }}><Icon name="map-pin" size={10} style={{ marginRight: 4 }} />{a.zone_id} • {a.section}</div>
                               <div style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 700 }}>Trigger: {a.trigger}</div>
                             </div>
                           </div>
                         </div>
                         {!a.acknowledged && (
                           <div 
                             style={{ padding: '10px 20px', borderRadius: 10, border: '1px solid var(--border)', fontSize: 13, fontWeight: 700, cursor: 'pointer', background: 'var(--bg-primary)' }}
                             onClick={() => fetch(`/alerts/acknowledge/${a.id}`, {method: 'POST'}).then(fetchData)}
                           >
                             Acknowledge
                           </div>
                         )}
                       </div>
                     ))
                   )}
                </div>
              )}
            </div>
          </main>

          {/* Floating Chatbot */}
          <div className="chat-fab" onClick={() => setShowChat(!showChat)}>
            <Icon name={showChat ? "x" : "message-square"} size={28} />
          </div>

          {showChat && (
            <div className="chat-window fade-in">
              <div style={{ background: 'var(--accent)', padding: '20px', color: 'white', display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>🤖</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>VenueIQ Agent</div>
                  <div style={{ fontSize: 11, opacity: 0.8 }}>Gemini-powered Crowd Intelligence</div>
                </div>
              </div>
              
              <div style={{ flex: 1, padding: '20px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 16, background: 'var(--bg-primary)' }}>
                {chatHistory.length === 0 && (
                  <div style={{ textAlign: 'center', marginTop: 20 }}>
                    <Icon name="sparkles" size={48} style={{ marginBottom: 12, opacity: 0.5 }} />
                    <div style={{ fontWeight: 600, marginBottom: 20 }}>How can I help you today?</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      {[
                        "Which zone is most crowded?",
                        "Where is the shortest wait time?",
                        "Are there any active alerts?",
                        "What is the current crowd vibe?"
                      ].map(s => (
                        <div key={s} className="chat-suggestion" onClick={() => handleAsk(null, s)}>
                          {s}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {chatHistory.map((m, i) => (
                  <div key={i} style={{ 
                    alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start',
                    maxWidth: '85%',
                    padding: '12px 16px',
                    borderRadius: m.role === 'user' ? '16px 16px 2px 16px' : '16px 16px 16px 2px',
                    background: m.role === 'user' ? 'var(--accent)' : 'var(--bg-card)',
                    color: m.role === 'user' ? 'white' : 'var(--text-primary)',
                    boxShadow: '0 4px 10px rgba(0,0,0,0.1)',
                    fontSize: 14,
                    lineHeight: 1.5
                  }}>
                    {m.text}
                    {m.tools && m.tools.length > 0 && (
                      <div style={{ display: 'flex', gap: 4, marginTop: 8, flexWrap: 'wrap' }}>
                        {m.tools.map(t => <span key={t} style={{ fontSize: 10, background: 'rgba(255,255,255,0.2)', padding: '2px 6px', borderRadius: 4 }}>⚡ {t}</span>)}
                      </div>
                    )}
                  </div>
                ))}
                {loading && <div style={{ fontSize: 12, color: 'var(--text-muted)' }} className="pulse">Agent is thinking...</div>}
              </div>

              <form onSubmit={(e) => handleAsk(e)} style={{ padding: '20px', borderTop: '1px solid var(--border)', display: 'flex', gap: 12 }}>
                <input 
                  value={chatMsg}
                  onChange={e => setChatMsg(e.target.value)}
                  placeholder="Type a message..."
                  style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 12, padding: '12px', background: 'var(--bg-primary)', color: 'var(--text-primary)', outline: 'none' }}
                />
                <button type="submit" style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--accent)', color: 'white', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name="send" size={18} />
                </button>
              </form>
            </div>
          )}
        </div>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (err) {
      console.error("Render error:", err);
    }
  </script>
</body>
</html>
